pre-commit:
  parallel: true
  jobs:
    - name: format
      run: bun oxfmt --no-error-on-unmatched-pattern '"{staged_files}"'
      stage_fixed: true

    - name: lint
      glob: '*.{js,jsx,cjs,mjs,ts,tsx,cts,mts,d.ts,d.cjs,d.mts}'
      run: bun oxlint --fix '"{staged_files}"'
      stage_fixed: true
